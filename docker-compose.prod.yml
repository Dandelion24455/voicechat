services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: voicechat
      POSTGRES_USER: voicechat
      POSTGRES_PASSWORD: ${DB_PASS:-voicechat}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicechat"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  mediasoup:
    build:
      context: .
      dockerfile: mediasoup-server/Dockerfile
    network_mode: host
    environment:
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET}
      ANNOUNCED_IP: ${ANNOUNCED_IP:-212.64.28.112}
      MAX_WORKERS: ${MAX_WORKERS:-4}
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "49999"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    network_mode: host
    volumes:
      - certs:/data/certs
    environment:
      PORT: "8080"
      DOMAIN: ${DOMAIN}
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_USER: voicechat
      DB_PASS: ${DB_PASS:-voicechat}
      DB_NAME: voicechat
      REDIS_ADDR: 127.0.0.1:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-1}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      MEDIASOUP_WS_HOST: ${MEDIASOUP_WS_HOST:-127.0.0.1}
      MEDIASOUP_WS_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  certs:
