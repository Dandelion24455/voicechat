name: Build Desktop Client

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build
        working-directory: client-desktop
        run: tauri build

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: voicechat-windows
          path: client-desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: voicechat-windows-portable
          path: client-desktop/src-tauri/target/release/bundle/nsis/*.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: client-desktop
        run: |
          cargo install tauri-cli
          cargo tauri build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: voicechat-macos
          path: client-desktop/src-tauri/target/release/bundle/dmg/*.dmg
